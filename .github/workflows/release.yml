name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget gnupg software-properties-common cmake ninja-build python3 python3-pip clang tar verilator iverilog
          python3 -m pip install setuptools wheel
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          sudo apt-get install -y llvm-19-dev mlir-19-tools libmlir-19-dev
          echo "/usr/lib/llvm-19/bin" >> "$GITHUB_PATH"

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          brew update
          brew install ninja cmake llvm@19 python@3
          python3 -m pip install setuptools wheel
          echo "$(brew --prefix llvm@19)/bin" >> "$GITHUB_PATH"

      - name: Build staged toolchain
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="pycircuit-${VERSION}-${RUNNER_OS}-${RUNNER_ARCH}"
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            LLVM_CONFIG="/usr/lib/llvm-19/bin/llvm-config"
          else
            LLVM_CONFIG="$(brew --prefix llvm@19)/bin/llvm-config"
          fi

          bash flows/scripts/pyc build \
            --llvm-config "${LLVM_CONFIG}" \
            --build-dir "$PWD/.pycircuit_out/toolchain/build" \
            --install-prefix "$PWD/.pycircuit_out/toolchain/install"

          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            export PYC_TOOLCHAIN_ROOT="$PWD/.pycircuit_out/toolchain/install"
            export PATH="$PYC_TOOLCHAIN_ROOT/bin:$PATH"
            unset PYCC
            bash flows/scripts/run_examples.sh
            bash flows/scripts/run_sims.sh
            bash flows/scripts/run_sims_nightly.sh
          fi

          cmake -S . -B .pycircuit_out/toolchain/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/.pycircuit_out/toolchain/install" \
            -DLLVM_DIR="$("${LLVM_CONFIG}" --cmakedir)" \
            -DMLIR_DIR="$(dirname "$("${LLVM_CONFIG}" --cmakedir)")/mlir" \
            -DCPACK_PACKAGE_VERSION="$VERSION" \
            -DCPACK_PACKAGE_FILE_NAME="$PKG"
          (cd .pycircuit_out/toolchain/build && cpack -G TGZ)

          mkdir -p dist
          mv ".pycircuit_out/toolchain/build/${PKG}.tar.gz" "dist/${PKG}.tar.gz"

          python3 packaging/wheel/create_wheel.py \
            --install-dir "$PWD/.pycircuit_out/toolchain/install" \
            --out-dir "$PWD/dist"

          python3 -m venv .venv-wheel
          source .venv-wheel/bin/activate
          pip install dist/*.whl
          export PYC_TOOLCHAIN_ROOT="$(python -c 'import pycircuit, pathlib; print((pathlib.Path(pycircuit.__file__).resolve().parent / "_toolchain").as_posix())')"
          export PYC_USE_INSTALLED_PYTHON_PACKAGE=1
          export PYC_SKIP_SEMANTIC_REGRESSIONS=1
          unset PYCC
          bash flows/scripts/run_examples.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycircuit-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/*.tar.gz
            dist/*.whl

  github-packages:
    needs: [build-packages]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish GHCR artifacts
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          shopt -s nullglob
          for archive in dist/*.tar.gz; do
            base="$(basename "${archive}" .tar.gz)"
            platform="${base#pycircuit-${VERSION}-}"
            platform="$(echo "${platform}" | tr '[:upper:]' '[:lower:]')"
            platform="${platform/linux-x64/linux-x86_64}"
            platform="${platform/macos-x64/macos-x86_64}"
            platform="${platform/macos-arm64/macos-arm64}"
            ref="ghcr.io/linxisa/pyc-tools-${platform}"
            oras push "${ref}:v${VERSION}" "${archive}:application/gzip"
            oras push "${ref}:latest" "${archive}:application/gzip"
            oras push "${ref}:llvm19" "${archive}:application/gzip"
          done

  github-release:
    needs: [build-packages]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
