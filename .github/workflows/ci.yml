name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:

env:
  LLVM_VERSION: "19"
  CMAKE_BUILD_TYPE: Release

jobs:
  lint:
    name: Python Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python check deps
        run: python -m pip install pyyaml

      - name: Validate cross-platform wheel tag helper
        run: |
          python packaging/wheel/get_wheel_plat_name.py --system linux --arch x86_64
          python packaging/wheel/get_wheel_plat_name.py --system macos --arch arm64
          python packaging/wheel/get_wheel_plat_name.py --system macos --arch x86_64

      - name: Byte-compile packaging + CLI modules
        run: |
          python -m py_compile \
            packaging/wheel/create_wheel.py \
            packaging/wheel/get_wheel_plat_name.py \
            packaging/wheel/platform_tags.py \
            compiler/frontend/pycircuit/packaged_toolchain.py \
            compiler/frontend/pycircuit/cli.py

      - name: Run API hygiene gate
        run: python flows/tools/check_api_hygiene.py compiler/frontend/pycircuit designs/examples docs README.md

  build-linux:
    name: Build Toolchain (Linux)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install wheel build deps
        run: python -m pip install setuptools wheel

      - name: Install LLVM 19 + build deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget gnupg software-properties-common cmake ninja-build clang verilator iverilog
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${LLVM_VERSION}
          sudo apt-get install -y llvm-${LLVM_VERSION}-dev mlir-${LLVM_VERSION}-tools libmlir-${LLVM_VERSION}-dev
          echo "/usr/lib/llvm-${LLVM_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build staged toolchain
        run: |
          bash flows/scripts/pyc build \
            --llvm-config /usr/lib/llvm-${LLVM_VERSION}/bin/llvm-config \
            --build-dir "$PWD/.pycircuit_out/toolchain/build" \
            --install-prefix "$PWD/.pycircuit_out/toolchain/install"

      - name: Build platform wheel
        run: |
          python packaging/wheel/create_wheel.py \
            --install-dir "$PWD/.pycircuit_out/toolchain/install" \
            --out-dir "$PWD/dist"

      - name: Run examples
        run: |
          export PYC_TOOLCHAIN_ROOT="$PWD/.pycircuit_out/toolchain/install"
          export PATH="$PYC_TOOLCHAIN_ROOT/bin:$PATH"
          export PYC_SKIP_SEMANTIC_REGRESSIONS=1
          unset PYCC
          bash flows/scripts/run_examples.sh

      - name: Upload toolchain
        uses: actions/upload-artifact@v4
        with:
          name: pyc-toolchain-linux
          path: .pycircuit_out/toolchain/install/
          retention-days: 1

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pyc-wheel-linux
          path: dist/*.whl
          retention-days: 1

  wheel-linux:
    name: Wheel Smoke (Linux)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install simulation deps
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator iverilog

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: pyc-wheel-linux
          path: dist

      - name: Install wheel and run example gate
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv .venv-wheel
          source .venv-wheel/bin/activate
          pip install dist/*.whl
          export PYC_TOOLCHAIN_ROOT="$(python -c 'import pycircuit, pathlib; print((pathlib.Path(pycircuit.__file__).resolve().parent / "_toolchain").as_posix())')"
          export PYC_USE_INSTALLED_PYTHON_PACKAGE=1
          export PYC_SKIP_SEMANTIC_REGRESSIONS=1
          unset PYCC
          bash flows/scripts/run_examples.sh

  build-macos:
    name: Build Toolchain (macOS)
    runs-on: macos-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install wheel build deps
        run: python -m pip install setuptools wheel

      - name: Install Homebrew packages
        run: |
          brew update
          brew install ninja cmake llvm@19 python@3
          echo "$(brew --prefix llvm@19)/bin" >> "$GITHUB_PATH"

      - name: Build staged toolchain
        run: |
          bash flows/scripts/pyc build \
            --llvm-config "$(brew --prefix llvm@19)/bin/llvm-config" \
            --build-dir "$PWD/.pycircuit_out/toolchain/build" \
            --install-prefix "$PWD/.pycircuit_out/toolchain/install"

      - name: Build platform wheel
        run: |
          python packaging/wheel/create_wheel.py \
            --install-dir "$PWD/.pycircuit_out/toolchain/install" \
            --out-dir "$PWD/dist"

      - name: Run example compile gate
        run: |
          export PYC_TOOLCHAIN_ROOT="$PWD/.pycircuit_out/toolchain/install"
          export PATH="$PYC_TOOLCHAIN_ROOT/bin:$PATH"
          export PYC_SKIP_SEMANTIC_REGRESSIONS=1
          unset PYCC
          bash flows/scripts/run_examples.sh

      - name: Smoke test installed wheel
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv .venv-wheel
          source .venv-wheel/bin/activate
          pip install dist/*.whl
          export PYC_TOOLCHAIN_ROOT="$(python -c 'import pycircuit, pathlib; print((pathlib.Path(pycircuit.__file__).resolve().parent / "_toolchain").as_posix())')"
          export PYC_USE_INSTALLED_PYTHON_PACKAGE=1
          export PYC_SKIP_SEMANTIC_REGRESSIONS=1
          unset PYCC
          bash flows/scripts/run_examples.sh

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pyc-wheel-macos
          path: dist/*.whl
          retention-days: 1
